- id: 1
  name: "Flutter Build Failed"
  description: |
    The Flutter build failed with an exception.


    {{#if filePath}}
    <strong>How to fix?:</strong>
    Fix the problems in the file(s) mentioned below and try again.
    <strong>File:</strong> {{filePath}}
    {{/if}}
    {{#if errorMessage}}
    <strong>Error:</strong> {{errorMessage}}
    {{/if}}

  categories: [developer, build, flutter, compile_error]
  overrides: [2, 3, 4]
  patterns:
    - regex: 'FAILURE:\s+Build\s+failed\s+with\s+an\s+exception\.'
      context:
        job: "🤖 Build Android APK"
      extract:
        - from: job
          regex: '(?<filePath>lib\S+\.dart:\d+:\d+):\s+Error:\s+(?<errorMessage>.+)'
          pick: multiple

- id: 2
  name: "Web Build Failed"
  description: |
    The Flutter web build failed to compile.

    <strong>How to fix?:</strong>
    Look for errors in the Flutter Build Failure and fix them before trying again.

  categories: [developer, build, javascript, compile_error]
  patterns:
    - regex: 'Error:\s+Failed\s+to\s+compile\s+application\s+for\s+the\s+Web\.'
      context:
        job: "🌐 Build Web App"

- id: 3
  name: "iOS Build Failed"
  description: |
    The iOS build failed.

    <strong>How to fix?:</strong>
    Look for errors in the following files and fix them before trying again.

    {{#if filePath}}
    <strong>File:</strong> {{filePath}}
    {{/if}}
    {{#if errorMessage}}
    <strong>Error:</strong> {{errorMessage}}
    {{/if}}

  categories: [developer, build, ios, compile_error]
  patterns:
    - substring: "Failed to build iOS app"
      context:
        job: "🍎 Build iOS"
      extract:
        - from: job
          regex: '(?<filePath>lib\S+\.dart:\d+:\d+):\s+Error:\s+(?<errorMessage>.+)'
          pick: multiple

- id: 4
  name: "Flutter Tests Build Failure"
  description: |
    Flutter tests failed due to a compilation error.

    {{#if filePath}}
    <strong>File:</strong> {{filePath}}
    {{/if}}
    {{#if errorMessage}}
    <strong>Error:</strong> {{errorMessage}}
    {{/if}}

  categories: [developer, test, flutter, compile_error]
  overrides: [6]
  patterns:
    - regex: 'Compilation\s+failed\s+for\s+testPath='
      extract:
        - from: job
          regex: '(?<filePath>lib\S+\.dart:\d+:\d+):\s+Error:\s+(?<errorMessage>.+)'
          pick: multiple

- id: 5
  name: "Flutter Formatting Issue"
  description: |
    Flutter formatting issues were found.

    {{#if filePath}}
    <strong>File:</strong> {{filePath}}
    {{/if}}

    <strong>How to fix?:</strong>
    Run `flutter format` on the file(s) mentioned above.

  categories: [developer, analysis, dart, formatting]
  patterns:
    - substring: "Format issues found"
      extract:
        - from: job
          regex: 'Formatted\s+(?<filePath>lib\S+\.dart)'
          pick: multiple
      context:
        job: "🔍 Code Quality Analysis"

- id: 6
  name: "Flutter Tests Failed"
  description: |
    Some Flutter tests failed.

    {{#if testPath}}
    <strong>How to fix?:</strong>
    Look for errors in the test(s) mentioned below and fix them before trying again.
    <strong>Test:</strong> {{testPath}}
    {{/if}}
    {{#if testName}}
    <strong>Name:</strong> {{testName}}
    {{/if}}

  categories: [developer, test, flutter, test_failure]
  patterns:
    - substring: "⚠️  Some tests failed."
      extract:
        - from: job
          regex: '\d+:\s+(?<testPath>\S+\.dart):\s+(?<testName>.+?)\s+\[E\]'
          pick: multiple
